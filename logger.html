<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Logger & Kurva Titrasi</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #1D9E75 0%, #0F6E56 100%);
    padding: 2rem;
  }
  .container { max-width: 820px; margin: 0 auto; display: flex; flex-direction: column; gap: 1.25rem; }
  .card {
    background: #fff; border-radius: 16px; padding: 1.5rem;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
  }
  .app-title { font-size: 22px; font-weight: 700; color: #0F6E56; margin-bottom: 2px; }
  .app-sub { font-size: 13px; color: #888; margin-bottom: 1.25rem; }
  .input-grid {
    display: grid; grid-template-columns: 1fr 1fr auto auto; gap: 10px; align-items: end;
  }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 12px; font-weight: 600; color: #555; }
  .field input {
    height: 42px; padding: 0 12px; border-radius: 10px;
    border: 1.5px solid #d0d7e2; background: #f7f9fc;
    font-size: 14px; color: #222; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .field input:focus { border-color: #1D9E75; box-shadow: 0 0 0 3px #1D9E7530; }
  .btn {
    height: 42px; padding: 0 18px; border-radius: 10px; border: none;
    font-size: 13px; font-weight: 600; cursor: pointer;
    transition: transform 0.12s, box-shadow 0.12s;
  }
  .btn-add {
    background: linear-gradient(135deg, #1D9E75, #0F6E56);
    color: #fff; box-shadow: 0 4px 12px rgba(29,158,117,0.35);
    margin-top: 17px;
  }
  .btn-add:hover { box-shadow: 0 6px 18px rgba(29,158,117,0.45); }
  .btn-add:active { transform: scale(0.95); }
  .btn-clear {
    background: #fff; color: #888;
    border: 1.5px solid #d0d7e2; margin-top: 17px;
  }
  .btn-clear:hover { background: #f7f9fc; color: #333; }
  .btn-clear:active { transform: scale(0.95); }
  .err { font-size: 12px; color: #c0392b; margin-top: 8px; min-height: 16px; }
  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .stat-box { background: #f0faf5; border-radius: 12px; padding: 12px 14px; }
  .stat-label { font-size: 11px; color: #0F6E56; font-weight: 600; margin-bottom: 4px; }
  .stat-val { font-size: 20px; font-weight: 700; color: #0F6E56; }
  .chart-title { font-size: 14px; font-weight: 600; color: #333; margin-bottom: 14px; }
  .chart-wrap { position: relative; width: 100%; height: 340px; }
  .table-title { font-size: 14px; font-weight: 600; color: #333; margin-bottom: 12px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    text-align: left; padding: 8px 12px; font-size: 11px;
    font-weight: 600; color: #888; border-bottom: 2px solid #e8f5f0;
    background: #f7fdfb;
  }
  tbody td { padding: 9px 12px; border-bottom: 1px solid #f0f0f0; color: #333; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: #f7fdfb; }
  .del-btn {
    background: none; border: 1px solid #fcc; color: #c0392b;
    border-radius: 6px; padding: 3px 8px; font-size: 11px;
    cursor: pointer; transition: background 0.15s;
  }
  .del-btn:hover { background: #fdecea; }
  .empty-msg { text-align: center; color: #bbb; font-style: italic; padding: 2rem; }
  @media (max-width: 600px) {
    .input-grid { grid-template-columns: 1fr 1fr; }
    .btn-add, .btn-clear { width: 100%; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<div class="container">

  <div class="card">
    <p class="app-title">Data Logger & Kurva Titrasi Interaktif</p>
    <p class="app-sub">Masukkan data volume dan pH — grafik dan tabel diperbarui secara langsung</p>
    <div class="input-grid">
      <div class="field">
        <label for="inp-vol">Volume Titran (mL)</label>
        <input id="inp-vol" type="number" step="any" min="0" placeholder="cth: 10.5" />
      </div>
      <div class="field">
        <label for="inp-ph">pH</label>
        <input id="inp-ph" type="number" step="any" min="0" max="14" placeholder="0 – 14" />
      </div>
      <button class="btn btn-add" id="btn-add">Masukkan Data</button>
      <button class="btn btn-clear" id="btn-clear">Hapus Semua</button>
    </div>
    <div class="err" id="err-msg"></div>
  </div>

  <div class="stats-grid">
    <div class="stat-box">
      <div class="stat-label">Jumlah Titik Data</div>
      <div class="stat-val" id="stat-count">0</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Volume Maks (mL)</div>
      <div class="stat-val" id="stat-vol">—</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Rentang pH</div>
      <div class="stat-val" id="stat-ph">—</div>
    </div>
  </div>

  <div class="card">
    <p class="chart-title">Grafik Kurva Titrasi</p>
    <div class="chart-wrap">
      <canvas id="titrasi-chart"></canvas>
    </div>
  </div>

  <div class="card">
    <p class="table-title">Tabel Data</p>
    <table>
      <thead>
        <tr>
          <th style="width:40px">No.</th>
          <th>Volume Titran (mL)</th>
          <th>pH</th>
          <th style="width:70px">Hapus</th>
        </tr>
      </thead>
      <tbody id="data-table">
        <tr><td colspan="4" class="empty-msg">Belum ada data. Masukkan data di atas.</td></tr>
      </tbody>
    </table>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
  let dataPoints = [];
  let idCounter = 0;
  let chart = null;

  function initChart() {
    const ctx = document.getElementById('titrasi-chart').getContext('2d');
    chart = new Chart(ctx, {
      type: 'scatter',
      data: {
        datasets: [{
          label: 'Kurva Titrasi',
          data: [],
          borderColor: '#1D9E75',
          backgroundColor: 'rgba(29,158,117,0.15)',
          pointBackgroundColor: '#1D9E75',
          pointBorderColor: '#0F6E56',
          pointBorderWidth: 2,
          pointRadius: 7,
          pointHoverRadius: 9,
          showLine: true,
          tension: 0.4,
          borderWidth: 2.5,
          fill: false
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#0F6E56',
            titleColor: '#fff',
            bodyColor: '#e0f5ed',
            padding: 10,
            callbacks: {
              title: () => 'Titik Data',
              label: ctx => [
                'Volume : ' + ctx.parsed.x.toFixed(2) + ' mL',
                'pH        : ' + ctx.parsed.y.toFixed(2)
              ]
            }
          }
        },
        scales: {
          x: {
            type: 'linear',
            title: { display: true, text: 'Volume Titran (mL)', color: '#555', font: { size: 12, weight: '600' } },
            min: 0,
            grid: { color: 'rgba(0,0,0,0.06)' },
            ticks: { color: '#888' }
          },
          y: {
            title: { display: true, text: 'pH', color: '#555', font: { size: 12, weight: '600' } },
            min: 0, max: 14,
            grid: { color: 'rgba(0,0,0,0.06)' },
            ticks: { color: '#888', stepSize: 2 }
          }
        }
      }
    });
  }

  function updateAll() {
    const sorted = [...dataPoints].sort((a, b) => a.x - b.x);
    chart.data.datasets[0].data = sorted.map(p => ({ x: p.x, y: p.y }));
    const maxVol = sorted.length ? Math.max(...sorted.map(p => p.x)) : 5;
    chart.options.scales.x.max = Math.ceil(maxVol) + 2;
    chart.update();

    const tbody = document.getElementById('data-table');
    if (sorted.length === 0) {
      tbody.innerHTML = '<tr><td colspan="4" class="empty-msg">Belum ada data. Masukkan data di atas.</td></tr>';
    } else {
      tbody.innerHTML = sorted.map((p, i) =>
        `<tr>
          <td style="color:#bbb">${i + 1}</td>
          <td>${p.x.toFixed(2)}</td>
          <td>${p.y.toFixed(2)}</td>
          <td><button class="del-btn" onclick="deletePoint(${p._id})">Hapus</button></td>
        </tr>`
      ).join('');
    }

    document.getElementById('stat-count').textContent = dataPoints.length;
    if (dataPoints.length === 0) {
      document.getElementById('stat-vol').textContent = '—';
      document.getElementById('stat-ph').textContent = '—';
    } else {
      const vols = dataPoints.map(p => p.x);
      const phs = dataPoints.map(p => p.y);
      document.getElementById('stat-vol').textContent = Math.max(...vols).toFixed(2);
      document.getElementById('stat-ph').textContent =
        Math.min(...phs).toFixed(1) + ' – ' + Math.max(...phs).toFixed(1);
    }
  }

  window.deletePoint = function(id) {
    dataPoints = dataPoints.filter(p => p._id !== id);
    updateAll();
  };

  document.getElementById('btn-add').addEventListener('click', function () {
    const volRaw = document.getElementById('inp-vol').value.trim();
    const phRaw  = document.getElementById('inp-ph').value.trim();
    const err = document.getElementById('err-msg');

    if (volRaw === '' || phRaw === '') { err.textContent = 'Volume dan pH tidak boleh kosong.'; return; }
    const vol = parseFloat(volRaw);
    const ph  = parseFloat(phRaw);
    if (isNaN(vol) || vol < 0)       { err.textContent = 'Volume harus bilangan positif.'; return; }
    if (isNaN(ph) || ph < 0 || ph > 14) { err.textContent = 'pH harus antara 0 dan 14.'; return; }

    err.textContent = '';
    dataPoints.push({ x: vol, y: ph, _id: idCounter++ });
    document.getElementById('inp-vol').value = '';
    document.getElementById('inp-ph').value = '';
    document.getElementById('inp-vol').focus();
    updateAll();
  });

  document.getElementById('btn-clear').addEventListener('click', function () {
    if (dataPoints.length === 0) return;
    if (!confirm('Yakin ingin menghapus semua data?')) return;
    dataPoints = [];
    updateAll();
  });

  ['inp-vol', 'inp-ph'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('btn-add').click();
    });
  });

  initChart();
</script>

</body>
</html>
